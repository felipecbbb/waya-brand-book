<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin News | Waya Surf</title>
    <meta name="robots" content="noindex, nofollow">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; font-src 'self' https://fonts.gstatic.com data:; connect-src 'self' https://pufybvfmatewxivtcsyv.supabase.co; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self';">
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            padding: 4rem 2rem;
            background: #f5f5f5;
            font-family: 'Outfit', sans-serif;
        }

        .admin-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        h1 {
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: inherit;
        }

        textarea {
            height: 150px;
        }

        .btn-admin {
            background: #0F172A;
            color: white;
            padding: 1rem 2rem;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
        }

        .btn-admin:hover {
            background: #1E293B;
        }

        #json-output {
            margin-top: 2rem;
            background: #eee;
            padding: 1rem;
            border-radius: 8px;
            font-family: monospace;
            white-space: pre-wrap;
            display: none;
        }

        .copy-hint {
            margin-top: 1rem;
            color: #666;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>

    <div class="admin-container">
        <!-- Login Container -->
        <div id="login-container" style="max-width: 400px; margin: 0 auto; text-align: center;">
            <h1>Admin Login</h1>
            <div class="form-group">
                <input type="email" id="email" placeholder="Email (info@wayasurf.com)" autocomplete="username" required>
            </div>
            <div class="form-group">
                <input type="password" id="password" placeholder="Password" autocomplete="current-password" required>
            </div>
            <button class="btn-admin" onclick="handleLogin()">Iniciar Sesión</button>
            <p id="login-error" style="color: red; margin-top: 1rem;"></p>
        </div>

        <!-- Admin Panel (Hidden by default) -->
        <div id="admin-panel" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h1>Waya News Admin</h1>
                <div style="gap: 1rem; display: flex;">
                    <button onclick="resetForm()"
                        style="background: #eee; border: none; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer;">+
                        Nueva Noticia</button>
                    <button onclick="handleLogout()"
                        style="background: transparent; border: 1px solid #ddd; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer;">Cerrar
                        Sesión</button>
                </div>
            </div>

            <!-- Editor Form -->
            <div class="editor-container"
                style="background: #f9f9f9; padding: 1.5rem; border-radius: 8px; margin-bottom: 3rem;">
                <h3 id="form-title">Nueva Noticia</h3>
                <input type="hidden" id="postId"> <!-- Hidden ID for Editing -->

                <div class="form-group">
                    <label>Titulo</label>
                    <input type="text" id="title" placeholder="Ej: Dawn Patrol..." maxlength="140" required>
                </div>

                <div class="form-group">
                    <label>Categoria</label>
                    <select id="category">
                        <option value="CULTURE">CULTURE</option>
                        <option value="PEOPLE">PEOPLE</option>
                        <option value="GEAR">GEAR</option>
                        <option value="TRAVEL">TRAVEL</option>
                        <option value="THOUGHTS">THOUGHTS</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Imagen Principal</label>
                    <div style="display: flex; gap: 1rem; align-items: center;">
                        <img id="preview-image" src=""
                            style="width: 50px; height: 50px; object-fit: cover; border-radius: 4px; display: none; background: #ddd;">
                        <input type="file" id="imageFile" accept="image/png,image/jpeg,image/webp,image/gif">
                    </div>
                    <input type="text" id="imageUrl" placeholder="O url existente..."
                        style="margin-top: 0.5rem; display: none;">
                </div>

                <div class="form-group">
                    <label>Extracto</label>
                    <textarea id="excerpt" style="height: 60px;" placeholder="Resumen..." maxlength="320"></textarea>
                </div>

                <div class="form-group">
                    <label>Contenido (HTML)</label>
                    <textarea id="content" style="height: 150px;" placeholder="<p>Contenido...</p>"></textarea>
                </div>

                <div class="form-group">
                    <label>
                        <input type="checkbox" id="isTextOnly" style="width: auto;"> Solo texto
                    </label>
                </div>

                <button class="btn-admin" id="btn-save" onclick="saveNews()">Publicar Noticia</button>
                <div id="status-message" style="margin-top: 1rem; font-weight: bold;"></div>
            </div>

            <!-- Posts List -->
            <h3>Noticias Publicadas</h3>
            <div id="posts-list" style="display: flex; flex-direction: column; gap: 1rem;">
                <!-- Items injected by JS -->
                <p>Cargando noticias...</p>
            </div>
        </div>

    </div>

    <!-- Supabase Deps -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>

    <script>
        const ALLOWED_CATEGORIES = new Set(['CULTURE', 'PEOPLE', 'GEAR', 'TRAVEL', 'THOUGHTS']);
        const ALLOWED_IMAGE_TYPES = new Set(['image/jpeg', 'image/png', 'image/webp', 'image/gif']);
        const MAX_IMAGE_SIZE_BYTES = 5 * 1024 * 1024;
        const LOGIN_GUARD_KEY = 'wayaAdminLoginGuard';
        const LOGIN_MAX_ATTEMPTS = 5;
        const LOGIN_LOCK_MS = 10 * 60 * 1000;
        const ALLOWED_HTML_TAGS = new Set([
            'p', 'br', 'strong', 'em', 'b', 'i', 'u', 'blockquote',
            'ul', 'ol', 'li', 'h2', 'h3', 'h4', 'h5', 'h6',
            'a', 'img', 'hr'
        ]);
        let previewObjectUrl = null;

        document.addEventListener('DOMContentLoaded', async () => {
            initDbStatus();
            bindImagePreview();

            if (!isSupabaseReady()) {
                setDbStatus('❌ Supabase Library Error', 'error');
                return;
            }

            const lockInfo = getLoginGuardState();
            if (lockInfo.lockUntil && lockInfo.lockUntil > Date.now()) {
                const seconds = Math.ceil((lockInfo.lockUntil - Date.now()) / 1000);
                document.getElementById('login-error').textContent = `Demasiados intentos. Espera ${seconds}s.`;
            }

            try {
                const session = await requireSession(false);
                setDbStatus('✅ DB Connected', 'ok');

                if (session) {
                    showAdmin();
                    await loadPosts();
                }
            } catch (error) {
                setDbStatus('⚠️ Auth Error', 'warn');
                console.error('Auth bootstrap error:', error);
            }
        });

        function isSupabaseReady() {
            return typeof supabase !== 'undefined' && !!supabase.auth;
        }

        function initDbStatus() {
            if (document.getElementById('db-status')) return;
            const statusDiv = document.createElement('div');
            statusDiv.id = 'db-status';
            statusDiv.style.cssText = 'position: fixed; bottom: 10px; right: 10px; background: #eee; padding: 5px 10px; border-radius: 4px; font-size: 12px; opacity: 0.85;';
            statusDiv.innerText = 'Checking connection...';
            document.body.appendChild(statusDiv);
        }

        function setDbStatus(message, kind = 'neutral') {
            const statusDiv = document.getElementById('db-status');
            if (!statusDiv) return;

            statusDiv.innerText = message;
            statusDiv.style.background = '#eee';
            statusDiv.style.color = '#111';

            if (kind === 'ok') {
                statusDiv.style.background = '#ddffdd';
                statusDiv.style.color = '#166534';
            } else if (kind === 'warn') {
                statusDiv.style.background = '#fef3c7';
                statusDiv.style.color = '#92400e';
            } else if (kind === 'error') {
                statusDiv.style.background = '#fee2e2';
                statusDiv.style.color = '#991b1b';
            }
        }

        async function requireSession(throwIfMissing = true) {
            const { data, error } = await supabase.auth.getSession();
            if (error) throw error;
            if (!data.session && throwIfMissing) {
                throw new Error('Sesion caducada. Vuelve a iniciar sesion.');
            }
            return data.session;
        }

        function getLoginGuardState() {
            try {
                return JSON.parse(localStorage.getItem(LOGIN_GUARD_KEY) || '{}');
            } catch (error) {
                return {};
            }
        }

        function setLoginGuardState(state) {
            localStorage.setItem(LOGIN_GUARD_KEY, JSON.stringify(state));
        }

        function clearLoginGuardState() {
            localStorage.removeItem(LOGIN_GUARD_KEY);
        }

        function registerFailedLoginAttempt() {
            const current = getLoginGuardState();
            const now = Date.now();
            const attempts = (current.attempts || 0) + 1;
            const payload = { attempts, lockUntil: current.lockUntil || 0 };
            if (attempts >= LOGIN_MAX_ATTEMPTS) {
                payload.lockUntil = now + LOGIN_LOCK_MS;
                payload.attempts = 0;
            }
            setLoginGuardState(payload);
        }

        function ensureNotLoginLocked() {
            const state = getLoginGuardState();
            if (state.lockUntil && state.lockUntil > Date.now()) {
                const seconds = Math.ceil((state.lockUntil - Date.now()) / 1000);
                throw new Error(`Cuenta bloqueada temporalmente. Espera ${seconds}s.`);
            }
        }

        function sanitizeText(value, maxLength) {
            const normalized = String(value ?? '')
                .replace(/[\u0000-\u001F\u007F]/g, ' ')
                .trim();
            return normalized.slice(0, maxLength);
        }

        function escapeHtml(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function plainTextToParagraphs(value) {
            const text = String(value ?? '').trim();
            if (!text) return '';

            return text
                .split(/\n\s*\n/)
                .map(chunk => `<p>${escapeHtml(chunk.trim()).replace(/\n/g, '<br>')}</p>`)
                .join('');
        }

        function sanitizeImageUrl(rawValue) {
            const raw = String(rawValue ?? '').trim();
            if (!raw) return '';
            if (raw.startsWith('images/')) return raw;
            try {
                const parsed = new URL(raw, window.location.origin);
                if (parsed.protocol === 'http:' || parsed.protocol === 'https:') {
                    return parsed.href;
                }
            } catch (error) {
                console.warn('Invalid image URL rejected:', raw);
            }
            return '';
        }

        function sanitizeRichHtml(input) {
            const dirty = String(input ?? '');
            if (!dirty.trim()) return '';

            const parser = new DOMParser();
            const doc = parser.parseFromString(dirty, 'text/html');
            doc.querySelectorAll('script, iframe, object, embed, form, input, button, textarea, select, style, link, meta')
                .forEach(node => node.remove());

            Array.from(doc.body.querySelectorAll('*')).forEach(node => {
                const tag = node.tagName.toLowerCase();

                if (!ALLOWED_HTML_TAGS.has(tag)) {
                    node.replaceWith(doc.createTextNode(node.textContent || ''));
                    return;
                }

                Array.from(node.attributes).forEach(attr => {
                    const name = attr.name.toLowerCase();
                    const value = attr.value.trim();

                    if (name.startsWith('on') || name === 'style' || name === 'srcdoc') {
                        node.removeAttribute(attr.name);
                        return;
                    }

                    if (tag === 'a' && name === 'href') {
                        const safeHref = value.startsWith('#') || value.startsWith('/') || /^(https?:|mailto:|tel:)/i.test(value);
                        if (!safeHref) node.removeAttribute('href');
                        return;
                    }

                    if (tag === 'img' && name === 'src') {
                        const safeSrc = sanitizeImageUrl(value);
                        if (!safeSrc) node.remove();
                        else node.setAttribute('src', safeSrc);
                        return;
                    }

                    const allowedForTag = (tag === 'a' && ['href', 'target', 'rel', 'title'].includes(name))
                        || (tag === 'img' && ['src', 'alt', 'title', 'loading'].includes(name));
                    if (!allowedForTag) {
                        node.removeAttribute(attr.name);
                    }
                });

                if (tag === 'a') node.setAttribute('rel', 'noopener noreferrer');
                if (tag === 'img' && !node.getAttribute('loading')) node.setAttribute('loading', 'lazy');
            });

            // If content is plain text (no tags), normalize it to editorial paragraphs.
            if (!doc.body.querySelector('*')) {
                return plainTextToParagraphs(doc.body.textContent || '');
            }

            return doc.body.innerHTML;
        }

        function normalizeErrorMessage(error) {
            const raw = String(error?.message || 'Fallo desconocido');
            if (/row-level security|permission denied/i.test(raw)) {
                return `${raw}. Revisa politicas RLS y permisos del usuario en Supabase.`;
            }
            if (/bucket|storage/i.test(raw)) {
                return `${raw}. Verifica que exista el bucket news-images y la politica de upload.`;
            }
            return raw;
        }

        function showStatusMessage(text, color = 'red') {
            const status = document.getElementById('status-message');
            status.style.color = color;
            status.textContent = text;
        }

        function getAdminStatusBox() {
            let box = document.getElementById('admin-status-box');
            if (box) return box;
            box = document.createElement('div');
            box.id = 'admin-status-box';
            box.style.padding = '1rem';
            box.style.marginBottom = '1rem';
            box.style.borderRadius = '8px';
            box.style.display = 'none';
            const container = document.getElementById('posts-list');
            container.parentNode.insertBefore(box, container);
            return box;
        }

        function showAdminStatus(text, ok = false) {
            const box = getAdminStatusBox();
            box.style.display = 'block';
            if (ok) {
                box.style.background = '#dcfce7';
                box.style.color = '#166534';
                box.style.border = '1px solid #22c55e';
            } else {
                box.style.background = '#fee2e2';
                box.style.color = '#991b1b';
                box.style.border = '1px solid #ef4444';
            }
            box.textContent = text;
            if (ok) setTimeout(() => { box.style.display = 'none'; }, 2000);
        }

        function bindImagePreview() {
            const fileInput = document.getElementById('imageFile');
            const preview = document.getElementById('preview-image');
            fileInput.addEventListener('change', () => {
                const file = fileInput.files && fileInput.files[0];
                if (!file) {
                    preview.style.display = 'none';
                    return;
                }
                if (!ALLOWED_IMAGE_TYPES.has(file.type)) {
                    fileInput.value = '';
                    preview.style.display = 'none';
                    showStatusMessage('Formato de imagen no permitido.');
                    return;
                }
                if (file.size > MAX_IMAGE_SIZE_BYTES) {
                    fileInput.value = '';
                    preview.style.display = 'none';
                    showStatusMessage('La imagen supera 5MB.');
                    return;
                }

                if (previewObjectUrl) URL.revokeObjectURL(previewObjectUrl);
                previewObjectUrl = URL.createObjectURL(file);
                preview.src = previewObjectUrl;
                preview.style.display = 'block';
                showStatusMessage('', '#166534');
            });
        }

        function buildPostPayload(imageUrl) {
            const title = sanitizeText(document.getElementById('title').value, 140);
            const excerpt = sanitizeText(document.getElementById('excerpt').value, 320);
            const rawCategory = sanitizeText(document.getElementById('category').value, 20).toUpperCase();
            const content = sanitizeRichHtml(document.getElementById('content').value);
            const isTextOnly = document.getElementById('isTextOnly').checked;

            if (title.length < 3) throw new Error('El titulo debe tener al menos 3 caracteres.');
            if (!ALLOWED_CATEGORIES.has(rawCategory)) throw new Error('Categoria invalida.');
            if (!content) throw new Error('El contenido esta vacio o contiene HTML no permitido.');

            return {
                title,
                category: rawCategory,
                excerpt,
                image: sanitizeImageUrl(imageUrl),
                content,
                is_text_only: Boolean(isTextOnly)
            };
        }

        function showAdmin() {
            document.getElementById('login-container').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
            document.getElementById('login-error').textContent = '';
        }

        async function handleLogin() {
            const errorMsg = document.getElementById('login-error');
            errorMsg.textContent = '';
            showStatusMessage('', '#166534');

            try {
                ensureNotLoginLocked();
                const email = sanitizeText(document.getElementById('email').value, 120).toLowerCase();
                const password = document.getElementById('password').value;

                if (!email || !password) {
                    throw new Error('Introduce email y password.');
                }

                const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) throw error;
                if (!data?.user?.email_confirmed_at) {
                    await supabase.auth.signOut();
                    throw new Error('Confirma el email del usuario antes de acceder al panel.');
                }

                clearLoginGuardState();
                showAdmin();
                await loadPosts();
            } catch (error) {
                registerFailedLoginAttempt();
                errorMsg.textContent = `Error: ${normalizeErrorMessage(error)}`;
            }
        }

        async function handleLogout() {
            try {
                await supabase.auth.signOut();
            } finally {
                location.reload();
            }
        }

        async function loadPosts() {
            const container = document.getElementById('posts-list');
            container.textContent = 'Cargando noticias...';

            try {
                await requireSession();
                const { data, error } = await supabase
                    .from('posts')
                    .select('id,title,category,created_at')
                    .order('created_at', { ascending: false });
                if (error) throw error;

                container.innerHTML = '';
                if (!data || data.length === 0) {
                    container.innerHTML = '<p>No hay noticias publicadas.</p>';
                    return;
                }

                data.forEach(post => {
                    const id = Number.parseInt(post.id, 10);
                    if (!Number.isInteger(id) || id <= 0) return;

                    const item = document.createElement('div');
                    item.style.cssText = 'background: white; padding: 1rem; border: 1px solid #eee; border-radius: 8px; display: flex; justify-content: space-between; align-items: center;';

                    const meta = document.createElement('div');
                    const title = document.createElement('strong');
                    title.style.fontSize = '1.1rem';
                    title.textContent = sanitizeText(post.title, 180);
                    const subtitle = document.createElement('div');
                    subtitle.style.cssText = 'font-size: 0.85rem; color: #666; margin-top: 0.2rem;';
                    subtitle.textContent = `${new Date(post.created_at).toLocaleDateString()} | ${sanitizeText(post.category, 20)}`;
                    meta.appendChild(title);
                    meta.appendChild(subtitle);

                    const actions = document.createElement('div');
                    actions.style.cssText = 'display: flex; gap: 0.5rem; align-items: center;';
                    actions.innerHTML = `
                        <button onclick="editPost(${id})" style="padding: 0.5rem; cursor: pointer;">✏️</button>
                        <button id="del-btn-${id}" onclick="initDelete(${id})" style="padding: 0.5rem; cursor: pointer; color: red; border: 1px solid #fee2e2; background: white; border-radius: 4px;">🗑️</button>
                        <button id="confirm-del-${id}" onclick="deletePost(${id})" style="display: none; padding: 0.5rem 1rem; cursor: pointer; color: white; background: red; border: none; border-radius: 4px; font-weight: bold;">Confirmar?</button>
                        <button id="cancel-del-${id}" onclick="cancelDelete(${id})" style="display: none; padding: 0.5rem; cursor: pointer; color: #666; background: #eee; border: none; border-radius: 4px;">✕</button>
                    `;

                    item.appendChild(meta);
                    item.appendChild(actions);
                    container.appendChild(item);
                });
            } catch (error) {
                container.innerHTML = '';
                const p = document.createElement('p');
                p.style.color = 'red';
                p.textContent = `Error cargando noticias: ${normalizeErrorMessage(error)}`;
                container.appendChild(p);
            }
        }

        function initDelete(id) {
            const del = document.getElementById(`del-btn-${id}`);
            const confirm = document.getElementById(`confirm-del-${id}`);
            const cancel = document.getElementById(`cancel-del-${id}`);
            if (!del || !confirm || !cancel) return;
            del.style.display = 'none';
            confirm.style.display = 'inline-block';
            cancel.style.display = 'inline-block';
        }

        function cancelDelete(id) {
            const del = document.getElementById(`del-btn-${id}`);
            const confirm = document.getElementById(`confirm-del-${id}`);
            const cancel = document.getElementById(`cancel-del-${id}`);
            if (!del || !confirm || !cancel) return;
            del.style.display = 'inline-block';
            confirm.style.display = 'none';
            cancel.style.display = 'none';
        }

        async function editPost(id) {
            try {
                await requireSession();
                const safeId = Number.parseInt(id, 10);
                if (!Number.isInteger(safeId) || safeId <= 0) throw new Error('ID de noticia invalido.');

                const { data, error } = await supabase
                    .from('posts')
                    .select('id,title,category,excerpt,content,image,is_text_only')
                    .eq('id', safeId)
                    .single();
                if (error) throw error;

                document.getElementById('postId').value = data.id;
                document.getElementById('title').value = sanitizeText(data.title, 140);
                document.getElementById('category').value = sanitizeText(data.category, 20).toUpperCase();
                document.getElementById('excerpt').value = sanitizeText(data.excerpt, 320);
                document.getElementById('content').value = String(data.content || '');
                document.getElementById('imageUrl').value = sanitizeImageUrl(data.image);
                document.getElementById('isTextOnly').checked = Boolean(data.is_text_only);

                const preview = document.getElementById('preview-image');
                const safeImage = sanitizeImageUrl(data.image);
                if (safeImage) {
                    preview.src = safeImage;
                    preview.style.display = 'block';
                } else {
                    preview.style.display = 'none';
                }

                document.getElementById('form-title').textContent = `Editar Noticia #${safeId}`;
                document.getElementById('btn-save').textContent = 'Actualizar Noticia';
                document.querySelector('.editor-container').scrollIntoView({ behavior: 'smooth' });
            } catch (error) {
                showStatusMessage(`Error cargando post: ${normalizeErrorMessage(error)}`);
            }
        }

        async function deletePost(id) {
            const safeId = Number.parseInt(id, 10);
            if (!Number.isInteger(safeId) || safeId <= 0) return;
            const btn = document.getElementById(`confirm-del-${safeId}`);
            if (btn) {
                btn.textContent = 'Borrando...';
                btn.disabled = true;
            }

            try {
                await requireSession();
                const { error } = await supabase.from('posts').delete().eq('id', safeId);
                if (error) throw error;
                showAdminStatus('¡Noticia borrada!', true);
                await loadPosts();
            } catch (error) {
                showAdminStatus(`Error: ${normalizeErrorMessage(error)}`, false);
                if (btn) {
                    btn.textContent = 'Confirmar?';
                    btn.disabled = false;
                }
            }
        }

        function resetForm() {
            document.getElementById('postId').value = '';
            document.getElementById('form-title').textContent = 'Nueva Noticia';
            document.getElementById('btn-save').textContent = 'Publicar Noticia';
            document.getElementById('title').value = '';
            document.getElementById('excerpt').value = '';
            document.getElementById('content').value = '';
            document.getElementById('imageUrl').value = '';
            document.getElementById('imageFile').value = '';
            document.getElementById('isTextOnly').checked = false;
            document.getElementById('preview-image').style.display = 'none';
            showStatusMessage('', '#166534');
        }

        async function saveNews() {
            const btn = document.getElementById('btn-save');
            const fileInput = document.getElementById('imageFile');
            const postIdRaw = document.getElementById('postId').value;
            const isEditing = Boolean(postIdRaw);
            const safePostId = Number.parseInt(postIdRaw, 10);
            const selectedFile = fileInput.files && fileInput.files[0];

            btn.disabled = true;
            btn.textContent = 'Procesando...';
            showStatusMessage('', '#166534');

            try {
                const session = await requireSession();
                let finalImageUrl = sanitizeImageUrl(document.getElementById('imageUrl').value);

                if (selectedFile) {
                    if (!ALLOWED_IMAGE_TYPES.has(selectedFile.type)) {
                        throw new Error('Formato de imagen no permitido.');
                    }
                    if (selectedFile.size > MAX_IMAGE_SIZE_BYTES) {
                        throw new Error('La imagen no puede superar 5MB.');
                    }

                    btn.textContent = 'Subiendo imagen...';
                    const ext = (selectedFile.name.split('.').pop() || 'jpg').toLowerCase().replace(/[^a-z0-9]/g, '');
                    const randomPart = typeof crypto !== 'undefined' && crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random().toString(36).slice(2, 10)}`;
                    const fileName = `${session.user.id}/${Date.now()}-${randomPart}.${ext}`;
                    const { error: uploadError } = await supabase.storage
                        .from('news-images')
                        .upload(fileName, selectedFile, { upsert: false, contentType: selectedFile.type });
                    if (uploadError) throw uploadError;

                    const { data: publicData } = supabase.storage.from('news-images').getPublicUrl(fileName);
                    finalImageUrl = sanitizeImageUrl(publicData?.publicUrl || '');
                }

                const post = buildPostPayload(finalImageUrl);

                let writeError = null;
                if (isEditing) {
                    if (!Number.isInteger(safePostId) || safePostId <= 0) {
                        throw new Error('ID de noticia invalido para actualizar.');
                    }
                    btn.textContent = 'Actualizando...';
                    const res = await supabase.from('posts').update(post).eq('id', safePostId);
                    writeError = res.error;
                } else {
                    btn.textContent = 'Guardando...';
                    const res = await supabase.from('posts').insert([post]);
                    writeError = res.error;
                }
                if (writeError) throw writeError;

                showStatusMessage(isEditing ? '¡Actualizado con exito!' : '¡Publicado con exito!', '#166534');
                resetForm();
                await loadPosts();
            } catch (error) {
                console.error('saveNews error:', error);
                showStatusMessage(`Error: ${normalizeErrorMessage(error)}`);
            } finally {
                btn.disabled = false;
                btn.textContent = isEditing ? 'Actualizar Noticia' : 'Publicar Noticia';
            }
        }
    </script>
</body>

</html>
