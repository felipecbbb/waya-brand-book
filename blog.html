<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noticias de Surf y Eventos en Canarias | Blog Waya Surf</title>
    <meta name="description"
        content="Actualidad del surf en Gran Canaria, eventos de la comunidad Waya y consejos para surfistas. Mantente informado de todo lo que pasa en nuestras olas.">
    <meta name="keywords"
        content="blog surf canarias, noticias surf telde, eventos surf gran canaria, consejos surf principiantes">
    <link rel="canonical" href="https://wayasurf.com/blog.html">
    <link rel="icon" type="image/png" href="images/waya-isotipo.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Outfit:wght@300;400;500;700;900&display=swap"
        rel="stylesheet">

    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.4/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.4/ScrollTrigger.min.js"></script>

    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/surf-redesign.css?v=diary_2.0">
    <link rel="stylesheet" href="css/blog-premium.css?v=fresh_1.0">
    <link rel="stylesheet" href="css/i18n.css">
</head>

<body class="is-diary">

    <!-- Header Placeholder -->
    <div id="header-placeholder"></div>

    <!-- Diary Header - REMOVED FOR IMMERSIVE HERO -->
    <!-- <header class="diary-header">...</header> -->

    <!-- Main Content -->
    <main>

        <!-- Dynamic Content Container -->
        <!-- The JS will inject:
             1. .blog-hero-immersive (First post)
             2. .magazine-container > .magazine-grid (Rest of posts)
        -->
        <div id="blog-engine-root">
            <!-- Skeleton / Loading State -->
            <div
                style="height: 100vh; display: flex; align-items: center; justify-content: center; background: #f8f8f8;">
                <div class="loader"
                    style="width: 50px; height: 50px; border: 5px solid #ddd; border-top-color: #FDD802; border-radius: 50%; animation: spin 1s linear infinite;">
                </div>
            </div>
            <style>
                @keyframes spin {
                    100% {
                        transform: rotate(360deg);
                    }
                }
            </style>
        </div>

    </main>

    <!-- Footer Placeholder -->
    <div id="footer-placeholder"></div>

    <!-- Supabase & Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/blog-engine.js"></script>

    <!-- Dynamic Header/Footer Loader -->
    <script src="js/script.js"></script>
    <!-- Translation Scripts for Header/Footer -->
    <script src="js/translations.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/components.js"></script>
</body>

</html>
